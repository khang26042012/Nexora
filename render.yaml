services:
  - type: web
    name: nexora
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    autoDeploy: true
    healthCheckPath: /NexoraGarden/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
