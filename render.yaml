services:
  - type: web
    name: nexorax-portfolio
    runtime: static
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/portfolio run build
    staticPublishPath: artifacts/portfolio/dist/public
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: redirect
        source: /NexoraGarden
        destination: https://nexoragarden.onrender.com
        permanent: true
      - type: redirect
        source: /NexoraGarden/*
        destination: https://nexoragarden.onrender.com
        permanent: true
      - type: rewrite
        source: /*
        destination: /index.html
