services:
  - type: web
    name: nexora
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    autoDeploy: true
    healthCheckPath: /NexoraGarden/health
    envVars:
      - key: NODE_ENV
        sync: false
      - key: PORT
        value: "8080"
      - key: LOG_LEVEL
        value: info
      - key: BASE_PATH
        value: /NexoraGarden

      # Telegram bot
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false

      # Gemini AI (4 key rotation)
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
      - key: GEMINI_KEY_3
        sync: false
      - key: GEMINI_KEY_4
        sync: false

      # Các API khác
      - key: ADMIN_KEY
        sync: false
      - key: REMOVE_BG_API_KEY
        sync: false
      - key: TEMPMAIL_WEBHOOK_SECRET
        sync: false
      - key: YOUTUBE_COOKIES
        sync: false
