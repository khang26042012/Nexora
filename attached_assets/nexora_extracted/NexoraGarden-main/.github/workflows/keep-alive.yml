name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping NexoraGarden (cache-bust)
        run: |
          TS=$(date +%s)
          STATUS1=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://nexorax.cloud/api/status?_=$TS" || echo "ERR")
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://nexoragarden.onrender.com/api/status?_=$TS" || echo "ERR")
          echo "nexorax.cloud: $STATUS1 | render: $STATUS2"
